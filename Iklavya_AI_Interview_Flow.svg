<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c2410c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#fafafa" rx="12"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" font-size="24" font-weight="700" fill="#111827">Iklavya AI Interview — Feature Flow &amp; Architecture</text>
  <text x="600" y="68" text-anchor="middle" font-size="13" fill="#6b7280">End-to-end user flow with data pipeline and AI integration</text>

  <!-- ═══ PHASE 1: SETUP ═══ -->
  <rect x="30" y="95" width="260" height="305" rx="12" fill="white" stroke="#d1d5db" filter="url(#shadow)"/>
  <rect x="30" y="95" width="260" height="36" rx="12" fill="url(#greenGrad)"/>
  <text x="160" y="118" text-anchor="middle" font-size="14" font-weight="600" fill="white">Phase 1 — Setup</text>

  <!-- Step boxes -->
  <rect x="50" y="145" width="220" height="40" rx="8" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="160" y="164" text-anchor="middle" font-size="12" fill="#166534">1. Click "AI Interview" in sidebar</text>
  <text x="160" y="178" text-anchor="middle" font-size="10" fill="#6b7280">/dashboard/ai-interview</text>

  <rect x="50" y="195" width="220" height="40" rx="8" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="160" y="214" text-anchor="middle" font-size="12" fill="#166534">2. Select Job Role</text>
  <text x="160" y="228" text-anchor="middle" font-size="10" fill="#6b7280">Bank PO, MFI, Fintech, Custom...</text>

  <rect x="50" y="245" width="220" height="40" rx="8" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="160" y="264" text-anchor="middle" font-size="12" fill="#166534">3. Upload Resume (PDF)</text>
  <text x="160" y="278" text-anchor="middle" font-size="10" fill="#6b7280">Optional but strongly encouraged</text>

  <rect x="50" y="295" width="220" height="40" rx="8" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="160" y="314" text-anchor="middle" font-size="12" fill="#166534">4. Paste Job Description</text>
  <text x="160" y="328" text-anchor="middle" font-size="10" fill="#6b7280">Optional but strongly encouraged</text>

  <rect x="50" y="345" width="220" height="38" rx="8" fill="#16a34a"/>
  <text x="160" y="369" text-anchor="middle" font-size="13" font-weight="600" fill="white">▶ Start Now</text>

  <!-- Arrow to Phase 2 -->
  <line x1="290" y1="260" x2="340" y2="260" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- ═══ PHASE 2: LIVE INTERVIEW ═══ -->
  <rect x="350" y="95" width="350" height="510" rx="12" fill="white" stroke="#d1d5db" filter="url(#shadow)"/>
  <rect x="350" y="95" width="350" height="36" rx="12" fill="url(#blueGrad)"/>
  <text x="525" y="118" text-anchor="middle" font-size="14" font-weight="600" fill="white">Phase 2 — Live Interview (15-20 Qs)</text>

  <!-- Interview loop diagram -->
  <rect x="370" y="145" width="310" height="44" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="525" y="164" text-anchor="middle" font-size="12" fill="#1e40af">AI asks question (dynamic, adaptive)</text>
  <text x="525" y="178" text-anchor="middle" font-size="10" fill="#6b7280">Claude generates → streamed via SSE</text>

  <line x1="525" y1="189" x2="525" y2="205" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <rect x="370" y="205" width="310" height="44" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="525" y="224" text-anchor="middle" font-size="12" fill="#1e40af">ElevenLabs TTS speaks question</text>
  <text x="525" y="238" text-anchor="middle" font-size="10" fill="#6b7280">Turbo v2.5 → audio/mpeg → browser</text>

  <line x1="525" y1="249" x2="525" y2="265" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <rect x="370" y="265" width="310" height="44" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="525" y="284" text-anchor="middle" font-size="12" fill="#1e40af">Student answers via microphone</text>
  <text x="525" y="298" text-anchor="middle" font-size="10" fill="#6b7280">SpeechRecognition API → live transcript</text>

  <line x1="525" y1="309" x2="525" y2="325" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <rect x="370" y="325" width="310" height="44" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="525" y="344" text-anchor="middle" font-size="12" fill="#1e40af">Silence detected (3s) or "Next" clicked</text>
  <text x="525" y="358" text-anchor="middle" font-size="10" fill="#6b7280">Transcript sent to backend</text>

  <line x1="525" y1="369" x2="525" y2="385" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Decision diamond -->
  <polygon points="525,385 610,420 525,455 440,420" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="525" y="416" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">AI decides</text>
  <text x="525" y="430" text-anchor="middle" font-size="10" fill="#1e40af">next move</text>

  <!-- Decision branches -->
  <!-- Left: Grill deeper -->
  <line x1="440" y1="420" x2="380" y2="420" stroke="#ea580c" stroke-width="1.5"/>
  <line x1="380" y1="420" x2="380" y2="167" stroke="#ea580c" stroke-width="1.5"/>
  <line x1="380" y1="167" x2="400" y2="167" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrowOrange)"/>
  <text x="366" y="310" text-anchor="end" font-size="10" fill="#ea580c" transform="rotate(-90,366,310)">Vague? Grill deeper</text>

  <!-- Right: New topic -->
  <line x1="610" y1="420" x2="670" y2="420" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="670" y1="420" x2="670" y2="167" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="670" y1="167" x2="650" y2="167" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="684" y="310" text-anchor="start" font-size="10" fill="#16a34a" transform="rotate(-90,684,310)">Good? Next topic ↑</text>

  <!-- Down: Complete -->
  <line x1="525" y1="455" x2="525" y2="480" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Sidebar info box -->
  <rect x="370" y="485" width="310" height="60" rx="8" fill="#f3f4f6" stroke="#d1d5db"/>
  <text x="525" y="505" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">📊 Live Sidebar Shows:</text>
  <text x="525" y="520" text-anchor="middle" font-size="10" fill="#6b7280">Progressive bar (Q7 of ~18) • Timer • Filler counter</text>
  <text x="525" y="533" text-anchor="middle" font-size="10" fill="#6b7280">Live transcript • Filler words highlighted in red</text>

  <!-- After ~15-20 Qs or End Interview -->
  <rect x="370" y="555" width="310" height="36" rx="8" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="525" y="578" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">Interview Complete (~15-20 Qs)</text>

  <!-- Arrow to Phase 3 -->
  <line x1="700" y1="575" x2="750" y2="575" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrowOrange)"/>

  <!-- ═══ PHASE 3: ANALYSIS ═══ -->
  <rect x="760" y="95" width="410" height="305" rx="12" fill="white" stroke="#d1d5db" filter="url(#shadow)"/>
  <rect x="760" y="95" width="410" height="36" rx="12" fill="url(#orangeGrad)"/>
  <text x="965" y="118" text-anchor="middle" font-size="14" font-weight="600" fill="white">Phase 3 — AI Analysis &amp; Report</text>

  <!-- Analysis steps -->
  <rect x="780" y="145" width="370" height="36" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="965" y="168" text-anchor="middle" font-size="12" fill="#9a3412">Full transcript → Claude for deep analysis</text>

  <line x1="965" y1="181" x2="965" y2="195" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrowOrange)"/>

  <rect x="780" y="195" width="370" height="44" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="965" y="214" text-anchor="middle" font-size="12" fill="#9a3412">Report Generated — includes:</text>
  <text x="965" y="228" text-anchor="middle" font-size="10" fill="#6b7280">Structured JSON → saved in InterviewReport table</text>

  <!-- Report contents -->
  <rect x="780" y="250" width="180" height="28" rx="6" fill="#fef2f2" stroke="#fecaca"/>
  <text x="870" y="269" text-anchor="middle" font-size="11" fill="#991b1b">🎯 Overall Score (0-100)</text>

  <rect x="970" y="250" width="180" height="28" rx="6" fill="#fef2f2" stroke="#fecaca"/>
  <text x="1060" y="269" text-anchor="middle" font-size="11" fill="#991b1b">📊 6 Skill Scores</text>

  <rect x="780" y="286" width="180" height="28" rx="6" fill="#fef2f2" stroke="#fecaca"/>
  <text x="870" y="305" text-anchor="middle" font-size="11" fill="#991b1b">🗣️ Filler/Stammer Analysis</text>

  <rect x="970" y="286" width="180" height="28" rx="6" fill="#fef2f2" stroke="#fecaca"/>
  <text x="1060" y="305" text-anchor="middle" font-size="11" fill="#991b1b">💬 Better Word Suggestions</text>

  <rect x="780" y="322" width="180" height="28" rx="6" fill="#fef2f2" stroke="#fecaca"/>
  <text x="870" y="341" text-anchor="middle" font-size="11" fill="#991b1b">📝 Q-by-Q Breakdown</text>

  <rect x="970" y="322" width="180" height="28" rx="6" fill="#fef2f2" stroke="#fecaca"/>
  <text x="1060" y="341" text-anchor="middle" font-size="11" fill="#991b1b">✅ Job Readiness Verdict</text>

  <rect x="780" y="358" width="370" height="28" rx="6" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="965" y="377" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">📈 Performance Improvement Plan (3-5 priorities)</text>

  <!-- ═══ TECH STACK BAR ═══ -->
  <rect x="30" y="620" width="1140" height="120" rx="12" fill="white" stroke="#d1d5db" filter="url(#shadow)"/>
  <rect x="30" y="620" width="1140" height="36" rx="12" fill="url(#purpleGrad)"/>
  <text x="600" y="643" text-anchor="middle" font-size="14" font-weight="600" fill="white">Technology Stack — Data Pipeline</text>

  <!-- Tech boxes -->
  <rect x="55" y="670" width="145" height="55" rx="8" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="127" y="691" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">Frontend</text>
  <text x="127" y="705" text-anchor="middle" font-size="9" fill="#6b7280">Next.js 16 + React</text>
  <text x="127" y="717" text-anchor="middle" font-size="9" fill="#6b7280">SpeechRecognition API</text>

  <text x="215" y="698" font-size="16" fill="#7c3aed">→</text>

  <rect x="230" y="670" width="145" height="55" rx="8" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="302" y="691" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">API Layer</text>
  <text x="302" y="705" text-anchor="middle" font-size="9" fill="#6b7280">Next.js API Routes</text>
  <text x="302" y="717" text-anchor="middle" font-size="9" fill="#6b7280">SSE Proxy</text>

  <text x="390" y="698" font-size="16" fill="#7c3aed">→</text>

  <rect x="405" y="670" width="145" height="55" rx="8" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="477" y="691" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">Backend</text>
  <text x="477" y="705" text-anchor="middle" font-size="9" fill="#6b7280">FastAPI (Python)</text>
  <text x="477" y="717" text-anchor="middle" font-size="9" fill="#6b7280">SQLAlchemy + Turso</text>

  <text x="565" y="698" font-size="16" fill="#7c3aed">→</text>

  <rect x="580" y="670" width="145" height="55" rx="8" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="652" y="691" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">AI Brain</text>
  <text x="652" y="705" text-anchor="middle" font-size="9" fill="#6b7280">Claude (Anthropic)</text>
  <text x="652" y="717" text-anchor="middle" font-size="9" fill="#6b7280">Dynamic Q&amp;A + Analysis</text>

  <text x="740" y="698" font-size="16" fill="#7c3aed">→</text>

  <rect x="755" y="670" width="145" height="55" rx="8" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="827" y="691" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">Voice</text>
  <text x="827" y="705" text-anchor="middle" font-size="9" fill="#6b7280">ElevenLabs TTS</text>
  <text x="827" y="717" text-anchor="middle" font-size="9" fill="#6b7280">Turbo v2.5</text>

  <text x="915" y="698" font-size="16" fill="#7c3aed">→</text>

  <rect x="930" y="670" width="220" height="55" rx="8" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="1040" y="691" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">Database</text>
  <text x="1040" y="705" text-anchor="middle" font-size="9" fill="#6b7280">Turso (SQLite) via Supabase</text>
  <text x="1040" y="717" text-anchor="middle" font-size="9" fill="#6b7280">InterviewSession → Message → Report</text>

  <!-- ═══ KEY FEATURES BAR ═══ -->
  <rect x="30" y="760" width="1140" height="120" rx="12" fill="white" stroke="#d1d5db" filter="url(#shadow)"/>
  <text x="600" y="788" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">Key Differentiators</text>

  <rect x="55" y="800" width="250" height="65" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="180" y="820" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">🎯 Dynamic Grilling</text>
  <text x="180" y="836" text-anchor="middle" font-size="10" fill="#6b7280">No fixed questions — AI adapts in</text>
  <text x="180" y="849" text-anchor="middle" font-size="10" fill="#6b7280">real-time, probes weak answers</text>

  <rect x="325" y="800" width="250" height="65" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="450" y="820" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">🗣️ Voice-Powered</text>
  <text x="450" y="836" text-anchor="middle" font-size="10" fill="#6b7280">ElevenLabs speaks questions, browser</text>
  <text x="450" y="849" text-anchor="middle" font-size="10" fill="#6b7280">transcribes answers — feels real</text>

  <rect x="595" y="800" width="250" height="65" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="720" y="820" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">📊 Deep Analysis</text>
  <text x="720" y="836" text-anchor="middle" font-size="10" fill="#6b7280">Filler words, better phrasing,</text>
  <text x="720" y="849" text-anchor="middle" font-size="10" fill="#6b7280">Q-by-Q ideal answers, improvement plan</text>

  <rect x="865" y="800" width="285" height="65" rx="8" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="1007" y="820" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">📋 Resume-Personalized</text>
  <text x="1007" y="836" text-anchor="middle" font-size="10" fill="#6b7280">Questions tailored to candidate's actual</text>
  <text x="1007" y="849" text-anchor="middle" font-size="10" fill="#6b7280">resume + JD for maximum realism</text>

  <!-- Footer -->
  <text x="600" y="893" text-anchor="middle" font-size="10" fill="#9ca3af">Iklavya AI Interview — Architecture Flow Diagram — April 2026</text>
</svg>