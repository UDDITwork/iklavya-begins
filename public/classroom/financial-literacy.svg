<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" fill="none">
  <rect width="400" height="225" fill="#FAFAFA"/>
  <!-- Rupee coin -->
  <circle cx="130" cy="80" r="32" stroke="#374151" stroke-width="2.5" fill="none"/>
  <text x="130" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="700" fill="#374151">₹</text>
  <!-- Growth chart -->
  <line x1="220" y1="140" x2="220" y2="40" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <line x1="220" y1="140" x2="350" y2="140" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <!-- Chart bars -->
  <rect x="235" y="115" width="18" height="25" rx="2" stroke="#374151" stroke-width="1.5" fill="none"/>
  <rect x="260" y="95" width="18" height="45" rx="2" stroke="#374151" stroke-width="1.5" fill="none"/>
  <rect x="285" y="75" width="18" height="65" rx="2" stroke="#374151" stroke-width="1.5" fill="none"/>
  <rect x="310" y="55" width="18" height="85" rx="2" stroke="#16a34a" stroke-width="1.5" fill="none"/>
  <!-- Upward arrow on chart -->
  <path d="M235 110 L280 80 L325 50" stroke="#16a34a" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-dasharray="4 3"/>
  <polyline points="318,48 325,50 322,57" stroke="#16a34a" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Piggy bank outline -->
  <ellipse cx="105" cy="145" rx="30" ry="22" stroke="#374151" stroke-width="2" fill="none"/>
  <!-- Piggy ear -->
  <path d="M90 125 Q85 118 92 120" stroke="#374151" stroke-width="1.5" fill="none"/>
  <!-- Piggy eye -->
  <circle cx="95" cy="138" r="2" fill="#374151"/>
  <!-- Piggy snout -->
  <ellipse cx="76" cy="142" rx="6" ry="5" stroke="#374151" stroke-width="1.5" fill="none"/>
  <!-- Piggy legs -->
  <line x1="90" y1="165" x2="90" y2="175" stroke="#374151" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="120" y1="165" x2="120" y2="175" stroke="#374151" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Coin slot -->
  <line x1="100" y1="123" x2="112" y2="123" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <!-- Title -->
  <text x="200" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#374151">Financial Literacy</text>
</svg>
