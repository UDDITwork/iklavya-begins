<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" fill="none">
  <rect width="400" height="225" fill="#FAFAFA"/>
  <!-- Laptop -->
  <rect x="100" y="45" width="120" height="80" rx="6" stroke="#374151" stroke-width="2.5" fill="none"/>
  <!-- Screen content - code lines -->
  <line x1="115" y1="62" x2="155" y2="62" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="115" y1="74" x2="175" y2="74" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="125" y1="86" x2="165" y2="86" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="115" y1="98" x2="145" y2="98" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="115" y1="110" x2="170" y2="110" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Laptop base -->
  <path d="M85 125 L100 125 L108 135 L212 135 L220 125 L235 125" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Phone -->
  <rect x="265" y="50" width="50" height="85" rx="8" stroke="#374151" stroke-width="2" fill="none"/>
  <line x1="282" y1="57" x2="298" y2="57" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Phone screen content -->
  <rect x="272" y="65" width="36" height="20" rx="3" stroke="#D1D5DB" stroke-width="1" fill="none"/>
  <line x1="272" y1="92" x2="308" y2="92" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="272" y1="100" x2="298" y2="100" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="272" y1="108" x2="305" y2="108" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Phone home button -->
  <circle cx="290" cy="129" r="4" stroke="#9CA3AF" stroke-width="1" fill="none"/>
  <!-- Globe/network icon -->
  <circle cx="160" cy="160" r="16" stroke="#374151" stroke-width="1.5" fill="none"/>
  <ellipse cx="160" cy="160" rx="8" ry="16" stroke="#374151" stroke-width="1" fill="none"/>
  <line x1="144" y1="160" x2="176" y2="160" stroke="#374151" stroke-width="1"/>
  <line x1="148" y1="150" x2="172" y2="150" stroke="#9CA3AF" stroke-width="0.8"/>
  <line x1="148" y1="170" x2="172" y2="170" stroke="#9CA3AF" stroke-width="0.8"/>
  <!-- Share/brand icon -->
  <circle cx="250" cy="155" r="6" stroke="#374151" stroke-width="1.5" fill="none"/>
  <circle cx="275" cy="145" r="6" stroke="#374151" stroke-width="1.5" fill="none"/>
  <circle cx="275" cy="168" r="6" stroke="#374151" stroke-width="1.5" fill="none"/>
  <line x1="256" y1="153" x2="269" y2="147" stroke="#374151" stroke-width="1.2"/>
  <line x1="256" y1="158" x2="269" y2="165" stroke="#374151" stroke-width="1.2"/>
  <!-- Title -->
  <text x="200" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#374151">Digital Skills &amp; Branding</text>
