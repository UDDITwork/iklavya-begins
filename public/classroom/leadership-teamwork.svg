<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" fill="none">
  <rect width="400" height="225" fill="#FAFAFA"/>
  <!-- Central leader figure -->
  <circle cx="200" cy="55" r="18" stroke="#374151" stroke-width="2.5" fill="none"/>
  <line x1="200" y1="73" x2="200" y2="105" stroke="#374151" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="200" y1="82" x2="175" y2="100" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <line x1="200" y1="82" x2="225" y2="100" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <!-- Flag held by leader -->
  <line x1="225" y1="100" x2="225" y2="60" stroke="#374151" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M225 60 L245 67 L225 74" stroke="#374151" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
  <!-- Team member left -->
  <circle cx="110" cy="95" r="14" stroke="#9CA3AF" stroke-width="1.8" fill="none"/>
  <line x1="110" y1="109" x2="110" y2="135" stroke="#9CA3AF" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Team member right -->
  <circle cx="290" cy="95" r="14" stroke="#9CA3AF" stroke-width="1.8" fill="none"/>
  <line x1="290" y1="109" x2="290" y2="135" stroke="#9CA3AF" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Team member bottom-left -->
  <circle cx="140" cy="140" r="12" stroke="#9CA3AF" stroke-width="1.5" fill="none"/>
  <line x1="140" y1="152" x2="140" y2="170" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Team member bottom-right -->
  <circle cx="260" cy="140" r="12" stroke="#9CA3AF" stroke-width="1.5" fill="none"/>
  <line x1="260" y1="152" x2="260" y2="170" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Connecting lines (team bonds) -->
  <line x1="130" y1="100" x2="180" y2="80" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="270" y1="100" x2="220" y2="80" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="155" y1="145" x2="185" y2="105" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="245" y1="145" x2="215" y2="105" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="125" y1="110" x2="140" y2="130" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="275" y1="110" x2="260" y2="130" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- Title -->
  <text x="200" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#374151">Leadership &amp; Teamwork</text>
</svg>
