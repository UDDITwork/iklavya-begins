<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" fill="none">
  <rect width="400" height="225" fill="#FAFAFA"/>
  <!-- Resume document -->
  <rect x="80" y="30" width="100" height="130" rx="6" stroke="#374151" stroke-width="2.5" fill="none"/>
  <!-- Photo placeholder on resume -->
  <rect x="95" y="42" width="28" height="28" rx="14" stroke="#9CA3AF" stroke-width="1.5" fill="none"/>
  <!-- Name line -->
  <line x1="130" y1="50" x2="165" y2="50" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <line x1="130" y1="60" x2="155" y2="60" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Section lines -->
  <line x1="95" y1="82" x2="165" y2="82" stroke="#374151" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="95" y1="94" x2="158" y2="94" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="95" y1="104" x2="162" y2="104" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="95" y1="114" x2="145" y2="114" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="95" y1="130" x2="165" y2="130" stroke="#374151" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="95" y1="142" x2="155" y2="142" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Star/checkmark on resume -->
  <polyline points="170,82 172,86 176,86 173,89 174,93 170,91 166,93 167,89 164,86 168,86" stroke="#16a34a" stroke-width="1" fill="none"/>
  <!-- Interview scene - interviewer -->
  <circle cx="290" cy="55" r="16" stroke="#374151" stroke-width="2" fill="none"/>
  <line x1="290" y1="71" x2="290" y2="100" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <line x1="290" y1="80" x2="270" y2="95" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <line x1="290" y1="80" x2="310" y2="95" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <!-- Desk -->
  <line x1="240" y1="110" x2="340" y2="110" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <!-- Interviewee (smaller, seated) -->
  <circle cx="290" cy="135" r="12" stroke="#9CA3AF" stroke-width="1.5" fill="none"/>
  <line x1="290" y1="147" x2="290" y2="165" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Arrow connecting resume to interview -->
  <path d="M190 95 Q215 95 235 80" stroke="#9CA3AF" stroke-width="1.5" fill="none" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6" fill="none" stroke="#9CA3AF" stroke-width="1"/>
    </marker>
  </defs>
  <!-- Title -->
  <text x="200" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#374151">Resume &amp; Interview Mastery</text>
</svg>
